kind = "web"
previewPath = "/"
title = "Kimdasa Construction"
version = "1.0.0"
id = "artifacts/kimdasa-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21764

[services.development]
run = "pnpm --filter @workspace/kimdasa-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kimdasa-web", "run", "build" ]
publicDir = "artifacts/kimdasa-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21764"
BASE_PATH = "/"
